<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Cam Runner</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <h1>🏃 CAM RUNNER</h1>
  <p class="sub">Steruj ciałem przed kamerką: trucht = bieg, przechył w bok = zmiana pasa, przysiad = kucanie, podskok = skok</p>
</header>

<div class="hud">
  <span>Wynik: <b id="score">0</b></span>
  <span>Rekord: <b id="best">0</b></span>
  <span>Status: <b id="poseStatus">--</b></span>
  <button id="recalBtn" class="btn small">Rekalibruj pozycję</button>
</div>

<main class="panel main">
  <div class="relWrap">
    <canvas id="gameCanvas" width="1280" height="560"></canvas>
    <div class="gameover" id="gameOverOverlay">
      <div class="go-title">💥 KONIEC GRY</div>
      <div class="go-score">Wynik: <span id="finalScore">0</span></div>
      <button class="btn" id="restartBtn">Zagraj ponownie</button>
    </div>
  </div>
</main>

<div class="status" id="statusMsg">Łączenie z serwerem Python...</div>

<div class="legend">
  <span class="pill">⬅️➡️ pasy</span>
  <span class="pill">⬆️ skok</span>
  <span class="pill">⬇️ kucnięcie</span>
  <span class="pill">🏃 trucht = ruch</span>
</div>

<div class="previewWrap panel">
  <div class="stage-label">Ty bez tła (z serwera Python)</div>
  <canvas id="previewCanvas" width="220" height="294"></canvas>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/static/game.js"></script>
</body>
</html>
