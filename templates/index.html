<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Sprintly</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ===== EKRAN STARTOWY ===== -->
<div id="startScreen">
  <div class="start-box">
    <div class="logo">🏃 SPRINTLY</div>
    <p class="start-sub">Steruj ciałem przed kamerką</p>

    <div class="cam-select-wrap">
      <label for="camSelect">Wybierz kamerę:</label>
      <div class="cam-row">
        <select id="camSelect"><option value="0">Szukam kamer...</option></select>
        <button class="btn small" id="refreshCams">↻</button>
      </div>
    </div>

    <button class="btn big" id="startBtn">Uruchom grę</button>

    <div class="start-legend">
      <span class="pill">⬅️➡️ pasy</span>
      <span class="pill">⬆️ skok</span>
      <span class="pill">⬇️ przysiad</span>
      <span class="pill">🏃 trucht = bieg</span>
    </div>
  </div>
</div>

<!-- ===== WIDOK GRY (fullscreen) ===== -->
<div id="gameScreen" class="hidden">

  <!-- HUD nakładka na canvas -->
  <div class="hud-overlay">
    <span>Wynik: <b id="score">0</b></span>
    <span>Rekord: <b id="best">0</b></span>
    <span id="poseStatus" class="pose-badge">--</span>
    <button class="btn small" id="recalBtn">Rekalibruj</button>
    <button class="btn small" id="fsBtn">⛶ Fullscreen</button>
    <button class="btn small danger" id="exitBtn">✕ Wyjdź</button>
  </div>

  <!-- Główny canvas gry -->
  <canvas id="gameCanvas" width="1920" height="1080"></canvas>

  <!-- Game over overlay -->
  <div class="gameover" id="gameOverOverlay">
    <div class="go-title">💥 KONIEC GRY</div>
    <div class="go-score">Wynik: <span id="finalScore">0</span></div>
    <button class="btn big" id="restartBtn">Zagraj ponownie</button>
    <button class="btn small mt" id="menuBtn">← Menu</button>
  </div>

  <!-- Podgląd kamery (prawy dolny róg) -->
  <div class="previewWrap">
    <div class="stage-label">Ty w grze</div>
    <canvas id="previewCanvas" width="240" height="320"></canvas>
  </div>

  <!-- Status połączenia -->
  <div class="status-bar" id="statusMsg">Łączenie...</div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/static/game.js"></script>
</body>
</html>
